{% extends "base.html" %}
{% block title %}Log in · dothub{% endblock %}
{% block body %}
<div style="max-width:420px;margin:42px auto 0">
  <div class="panel" style="cursor:default;margin-top:0">
    <div class="panel-b">
      <div class="eyebrow">Welcome</div>
      <h1 style="font-family:var(--serif);font-weight:600;font-size:30px;letter-spacing:-.02em;line-height:1.1">Welcome back</h1>
      <p class="sub" style="margin-top:8px;font-size:14.5px">Log in to publish, pull, and follow setups.</p>

      {% if error %}
      <div class="banner danger" style="margin-top:18px">
        <span class="ico">!</span>
        <div><b>{{ error }}</b></div>
      </div>
      {% endif %}

      <form method="post" action="/login" style="margin-top:22px;display:flex;flex-direction:column;gap:16px">
        <label style="display:flex;flex-direction:column;gap:7px">
          <span style="font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)">Email</span>
          <input type="email" name="email" required autocomplete="email"
                 style="font-family:var(--sans);font-size:14.5px;color:var(--ink);background:var(--raise);border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px 14px;outline:0">
        </label>
        <label style="display:flex;flex-direction:column;gap:7px">
          <span style="font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)">Password</span>
          <input type="password" name="password" required autocomplete="current-password"
                 style="font-family:var(--sans);font-size:14.5px;color:var(--ink);background:var(--raise);border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px 14px;outline:0">
        </label>
        <button type="submit" class="btn primary" style="justify-content:center;margin-top:4px">Log in</button>
      </form>

      <p style="margin-top:20px;font-size:14px;color:var(--ink-2)">
        New to dothub? <a href="/signup" style="color:var(--blue-700);font-weight:600">Create an account</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
